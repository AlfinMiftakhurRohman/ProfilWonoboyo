<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500&family=Hanken+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./styles.css">
</helmet>
<nav class="nav"><div class="wrap-x navrow"><a href="Beranda.dc.html" class="brandlink"><span class="emblem">W</span><span><span class="brand-name">Wonoboyo</span><span class="brand-sub">Desa · Bondowoso</span></span></a><div class="nav-links"><sc-for list="{{ links }}" as="l" hint-placeholder-count="8"><a href="{{ l.href }}" class="{{ l.cls }}">{{ l.label }}</a></sc-for></div><button class="burger" aria-label="Menu"><span></span><span></span><span></span></button></div></nav>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1240,&quot;height&quot;:80},&quot;active&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;beranda&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const active = this.props.active || 'beranda';
    const items = [
      ['beranda','Beranda','Beranda.dc.html'],
      ['profil','Profil Desa','Profil-Desa.dc.html'],
      ['pemerintahan','Pemerintahan','Pemerintahan.dc.html'],
      ['potensi','Potensi','Potensi-Desa.dc.html'],
      ['produk','Produk','Produk-Desa.dc.html'],
      ['berita','Berita','Berita.dc.html'],
      ['galeri','Galeri','Galeri.dc.html'],
      ['kontak','Kontak','Kontak.dc.html'],
    ];
    return { links: items.map(([k,label,href]) => ({ href, label, cls: k===active ? 'active' : '' })) };
  }
}
</script>
</body>
</html>
